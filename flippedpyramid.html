<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

let n = 7;

for(let i = 1; i <= n; i++)
{
    let row = "";     

    for(let sp = n-1; sp >= i; sp--)
    {
        row += " ";
    }

    for(let j = 1; j <= i; j++)
    {
        row += "*";
    }

    console.log(row);
}

</script>
</body>
</html>
